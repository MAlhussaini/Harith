<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000" id="meta-theme">
<title>حارث · التحكم في الري</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--card:#0a0a0a;--elev:#141414;--elev2:#1e1e1e;
  --line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.18);
  --acc:#2db87a;--acc-dim:rgba(45,184,122,.14);
  --dan:#e05050;--dan-dim:rgba(224,80,80,.12);
  --txt:#e9ecf2;--txt2:#9aa3b2;--txt3:#666e7c;
  --warn:#e8a030;--warn-dim:rgba(232,160,48,.15);
  --demo:#8b93ff;--demo-dim:rgba(139,147,255,.22);
  --hdr-bg:rgba(0,0,0,.88);--code-bg:#141414;--code-c:#9cdcfe;
  --r:12px;--r-sm:9px;
  color-scheme:dark;
}
html[data-theme="light"]{
  --bg:#f4f5f7;--card:#ffffff;--elev:#eef0f3;--elev2:#e4e7eb;
  --line:rgba(15,23,42,.1);--line2:rgba(15,23,42,.22);
  --acc:#149463;--acc-dim:rgba(20,148,99,.12);
  --dan:#d63b3b;--dan-dim:rgba(214,59,59,.1);
  --txt:#171c26;--txt2:#4a5568;--txt3:#8a93a3;
  --warn:#a86e0c;--warn-dim:rgba(168,110,12,.13);
  --demo:#5b63d6;--demo-dim:rgba(91,99,214,.16);
  --hdr-bg:rgba(244,245,247,.92);--code-bg:#f0f2f5;--code-c:#0b62c4;
  color-scheme:light;
}
html[data-theme="light"] .toast{box-shadow:0 8px 24px rgba(0,0,0,.18)}
html[data-theme="light"] .stn-card.running{background:rgba(20,148,99,.05)}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Tahoma,sans-serif;font-size:15px;line-height:1.5;-webkit-tap-highlight-color:transparent;min-height:100vh}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}
button:disabled{opacity:.45;cursor:default}
svg{display:block;width:1.1em;height:1.1em;flex:none;fill:currentColor}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
input:focus-visible,select:focus-visible{outline:none}
.ltr,input[type=time],input[type=number]{direction:ltr}
.view{display:none}.view.active{display:block}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));inset-inline:16px;margin-inline:auto;width:fit-content;max-width:calc(100% - 32px);background:var(--elev2);border:1px solid var(--line2);border-radius:999px;padding:10px 18px;font-size:13px;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.6);text-align:center}
.toast.ok{border-color:rgba(45,184,122,.5);color:var(--acc)}
.toast.err{border-color:rgba(224,80,80,.55);color:#f29a9a}

/* ---------- Setup view ---------- */
.setup-shell{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px 16px;padding-top:calc(24px + env(safe-area-inset-top));padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.setup-card{position:relative;width:100%;max-width:400px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;display:flex;flex-direction:column;gap:18px}
.card-theme{position:absolute;top:14px;inset-inline-end:14px;width:40px;height:40px;border-radius:11px;background:var(--elev);border:1px solid var(--line2);color:var(--txt2);display:grid;place-items:center;z-index:2}
.card-theme svg{width:21px;height:21px}
.card-demo{position:absolute;top:14px;inset-inline-start:14px;height:40px;padding:0 12px;border-radius:11px;background:var(--elev);border:1px solid var(--line2);color:var(--txt2);display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;z-index:2}
.demo-dot{width:8px;height:8px;border-radius:50%;background:var(--demo);box-shadow:0 0 0 3px var(--demo-dim)}
.start-time{font-size:11.5px;color:var(--txt2);margin-top:-2px}
.start-time .lbl{color:var(--txt3)}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.brand-mark{width:58px;height:58px;border-radius:18px;background:var(--acc-dim);border:1px solid rgba(45,184,122,.35);display:grid;place-items:center;color:var(--acc)}
.brand-mark svg{width:30px;height:30px}
.brand h1{font-size:clamp(19px,5vw,22px);font-weight:600}
.brand-sub{font-size:12.5px;color:var(--txt3);letter-spacing:.5px}
.field{display:flex;flex-direction:column;gap:7px}
.field>label{font-size:13px;color:var(--txt2)}
.hint{font-size:12px;color:var(--txt3);line-height:1.65}
.inp{width:100%;min-height:48px;padding:11px 14px;font-size:16px;background:var(--elev);border:1px solid var(--line2);border-radius:var(--r-sm);color:var(--txt);transition:border-color .15s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--txt3)}
select.inp{cursor:pointer}
.seg{display:grid;grid-template-columns:1fr 1fr;background:var(--elev);border:1px solid var(--line2);border-radius:var(--r-sm);padding:4px;gap:4px}
.seg-btn{min-height:40px;border-radius:6px;font-size:14.5px;color:var(--txt2)}
.seg-btn.act{background:var(--acc-dim);color:var(--acc);font-weight:600}
.btn-primary{min-height:52px;width:100%;border-radius:var(--r-sm);background:var(--acc);color:#04140c;font-weight:700;font-size:16.5px;display:flex;align-items:center;justify-content:center;gap:10px;transition:filter .15s}
.setup-status{min-height:20px;font-size:13px;text-align:center;color:var(--txt2)}
.setup-status.err{color:#f29a9a}
.spinner{width:18px;height:18px;border:2.5px solid rgba(0,0,0,.25);border-top-color:#04140c;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Main view ---------- */
.hdr{position:sticky;top:0;z-index:20;background:var(--hdr-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top))}
.topbar-lead{display:flex;align-items:center;gap:10px;min-width:0}
.topbar-title{font-size:15.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{flex:none;font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600}
.badge.on{background:var(--acc-dim);color:var(--acc)}
.badge.off{background:var(--elev2);color:var(--txt3)}
.badge.q{background:var(--warn-dim);color:var(--warn)}
.badge.wait{background:var(--elev2);color:var(--txt2)}
.badge.dis{background:var(--dan-dim);color:#e08a8a}
.badge.err{background:var(--dan-dim);color:#f29a9a}
.badge.demo{background:var(--demo-dim);color:var(--demo)}
.icon-btn{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;color:var(--txt2)}
.icon-btn svg{width:21px;height:21px}
.tabs{display:grid;grid-template-columns:1fr 1fr;padding:0 12px;max-width:1140px;margin-inline:auto}
.tab{min-height:46px;font-size:14.5px;color:var(--txt2);border-bottom:2px solid transparent;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px}
.tab.act{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.content{max-width:1140px;margin-inline:auto;padding:16px;padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.panel{display:none}.panel.act{display:block}

/* Stations */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 8px;text-align:center}
.stat-n{font-size:clamp(20px,6vw,26px);font-weight:700}
.stat-n.acc{color:var(--acc)}.stat-n.dim{color:var(--txt3)}
.stat-l{font-size:11.5px;color:var(--txt2);margin-top:3px}
.actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.actions .btn{flex:1}
.btn{min-height:44px;padding:0 16px;border-radius:var(--r-sm);border:1px solid var(--line2);background:var(--card);color:var(--txt);font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,border-color .15s}
.btn:active{transform:scale(.98)}
.btn.acc{border-color:rgba(45,184,122,.5);color:var(--acc)}
.btn.dan{border-color:rgba(224,80,80,.5);color:#f08a8a}
.btn.wide{width:100%}
.stn-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(min(100%,250px),1fr))}
.stn-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:10px}
.stn-card.running{border-color:rgba(45,184,122,.55);background:rgba(45,184,122,.04)}
.stn-card.off{opacity:.55}
.stn-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.stn-name{font-size:15px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.run-info{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--acc)}
.run-info.q{color:var(--warn)}
.run-bar{height:4px;border-radius:99px;background:var(--elev2);overflow:hidden}
.run-fill{height:100%;background:var(--acc);border-radius:99px;transition:width .6s linear}
.dur-row{display:flex;align-items:center;gap:8px}
.dur-row label{font-size:12px;color:var(--txt3);flex:1}
.dur-input{width:94px;min-height:40px;text-align:center;font-size:16px;background:var(--elev);border:1px solid var(--line2);border-radius:8px;color:var(--txt);padding:4px 8px}
.dur-input:focus{border-color:var(--acc)}
.stn-actions{display:flex;gap:8px}
.stn-actions .btn{flex:1;min-height:42px;padding:0 8px;font-size:13.5px}
.stn-actions .icon-only{flex:0 0 44px;padding:0}
.empty{font-size:13px;color:var(--txt3);padding:8px 2px}

/* Advanced */
.adv-grid{display:grid;gap:14px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:14px}
.card h2{font-size:12.5px;font-weight:600;color:var(--txt3);letter-spacing:.08em}
.sched-list{display:flex;flex-direction:column;gap:8px}
.sched-item{background:var(--elev);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;display:flex;align-items:center;gap:10px}
.sched-info{flex:1;min-width:0}
.sched-stn{font-size:14px;font-weight:600}
.sched-meta{font-size:12px;color:var(--txt2);margin-top:2px;display:flex;flex-wrap:wrap;gap:2px 12px}
.del-btn{flex:none;width:38px;height:38px;border-radius:8px;color:var(--txt3);display:grid;place-items:center}
.add-form{display:grid;gap:10px;grid-template-columns:1fr 1fr;padding-top:14px;border-top:1px dashed var(--line)}
.af-field{display:flex;flex-direction:column;gap:5px}
.af-field.full{grid-column:1/-1}
.af-field label{font-size:11.5px;color:var(--txt3)}
.add-form .inp{min-height:46px;padding:8px 12px}
.add-form>.btn{grid-column:1/-1;min-height:46px}
.plan-row{display:flex;flex-direction:column;gap:10px;padding-top:14px;border-top:1px dashed var(--line)}
.check{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--txt2);cursor:pointer}
.check input{width:17px;height:17px;accent-color:var(--acc)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-row .btn{flex:1}
.json-wrap{display:flex;flex-direction:column;gap:8px}
.json-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.json-head h2{flex:1}
.json-head .btn{min-height:38px;padding:0 14px;font-size:13px}
.json-out{direction:ltr;text-align:left;background:var(--code-bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:var(--code-c);white-space:pre-wrap;word-break:break-word;max-height:320px;overflow:auto;line-height:1.55}
.name-row{display:grid;grid-template-columns:52px 1fr;gap:10px;align-items:center}
.name-row+.name-row{margin-top:8px}
.name-lbl{font-size:12px;color:var(--txt3)}
.name-row .inp{min-height:44px;padding:8px 12px}

/* ---------- Breakpoints ---------- */
@media(hover:hover){
  .btn:hover{background:var(--elev);border-color:var(--line2)}
  .btn.acc:hover{background:var(--acc-dim)}
  .btn.dan:hover{background:var(--dan-dim)}
  .btn-primary:hover{filter:brightness(1.08)}
  .icon-btn:hover{background:var(--elev);color:var(--txt)}
  .card-theme:hover{background:var(--elev2);color:var(--txt)}
  .card-demo:hover{background:var(--elev2);color:var(--txt)}
  .del-btn:hover{color:#f08a8a;background:var(--dan-dim)}
  .seg-btn:not(.act):hover{color:var(--txt)}
  .tab:not(.act):hover{color:var(--txt)}
}
@media(max-width:355px){
  .content{padding:12px 10px}
  .stn-actions .btn{font-size:12.5px}
  .stat-l{font-size:10.5px}
  .setup-card{padding:22px 16px}
}
@media(min-width:640px){
  .actions .btn,.btn-row .btn{flex:0 0 auto}
  .add-form{grid-template-columns:1.3fr 1fr .95fr .8fr auto;align-items:end}
  .af-field.full{grid-column:auto}
  .add-form>.btn{grid-column:auto}
  .plan-row{flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .plan-row .inp{max-width:320px}
}
@media(min-width:900px){
  .adv-grid{grid-template-columns:1.25fr 1fr;align-items:start}
  .stn-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .content{padding:22px 24px}
}
</style>
</head>
<body>

<div id="toast" class="toast" hidden></div>

<!-- ============ 1) Setup / Connect ============ -->
<section id="view-setup" class="view active">
  <div class="setup-shell">
    <div class="setup-card">
      <button class="card-corner card-demo" id="demo-btn" onclick="startDemo()" data-i18n-aria="demoTitle"><span class="demo-dot"></span><span data-i18n="demoBadge">تجريبي</span></button>
      <button class="card-corner card-theme" id="theme-fab" onclick="toggleTheme()" data-i18n-aria="theme"></button>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2s6 6.7 6 11.2A6 6 0 0 1 6 13.2C6 8.7 12 2 12 2z"/></svg>
        </div>
        <h1 data-i18n="appTitle">التحكم في نظام الري</h1>
        <p class="brand-sub">OpenSprinkler · Harith</p>
      </div>

      <div class="field">
        <label data-i18n="language">اللغة</label>
        <div class="seg" role="group" aria-label="Language">
          <button type="button" class="seg-btn act" id="lang-ar" onclick="setLang('ar')">العربية</button>
          <button type="button" class="seg-btn" id="lang-en" onclick="setLang('en')">English</button>
        </div>
      </div>

      <div class="field">
        <label for="cfg-host" data-i18n="host">عنوان الجهاز (Host)</label>
        <input class="inp ltr" id="cfg-host" inputmode="url" autocomplete="off" spellcheck="false" placeholder="http://192.168.x.x" value="http://192.168.100.30">
        <p class="hint" data-i18n="hostHint"></p>
      </div>

      <div class="field">
        <label for="cfg-pw" data-i18n="password">كلمة المرور</label>
        <input class="inp ltr" id="cfg-pw" type="password" autocomplete="current-password" placeholder="••••••••" value="opendoor">
      </div>

      <button class="btn-primary" id="connect-btn" onclick="connectOS()">
        <span class="spinner" id="conn-spin" hidden></span>
        <span data-i18n="connect">اتصال</span>
      </button>

      <p class="setup-status" id="setup-status" role="status"></p>
    </div>
  </div>
</section>

<!-- ============ 2) Main: timers + advanced ============ -->
<section id="view-main" class="view">
  <header class="hdr">
    <div class="topbar">
      <div class="topbar-lead">
        <span class="badge off" id="conn-badge">غير متصل</span>
        <strong class="topbar-title" data-i18n="appTitle">التحكم في نظام الري</strong>
      </div>
      <div style="display:flex;gap:4px;flex:none">
        <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" data-i18n-aria="theme"></button>
        <button class="icon-btn" onclick="goSetup()" data-i18n-aria="editConn">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.74 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.42.34.68.24l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.26.1.54 0 .68-.24l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg>
        </button>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab act" id="tab-btn-stations" onclick="switchTab('stations',this)" data-i18n="tabStations">المحطات</button>
      <button class="tab" id="tab-btn-adv" onclick="switchTab('adv',this)" data-i18n="tabAdvanced">إعدادات متقدمة</button>
    </nav>
  </header>

  <main class="content">

    <!-- Stations / timers -->
    <div class="panel act" id="tab-stations">
      <div class="stat-row">
        <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l" data-i18n="total">إجمالي المحطات</div></div>
        <div class="stat"><div class="stat-n acc" id="s-active">0</div><div class="stat-l" data-i18n="activeNow">نشطة الآن</div></div>
        <div class="stat"><div class="stat-n dim" id="s-disabled">0</div><div class="stat-l" data-i18n="disabledCount">معطّلة</div></div>
      </div>
      <div class="actions">
        <button class="btn dan" onclick="stopAll()">
          <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
          <span data-i18n="stopAll">إيقاف الكل</span>
        </button>
        <button class="btn acc" onclick="refreshStations()">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.73 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          <span data-i18n="refresh">تحديث</span>
        </button>
      </div>
      <div class="stn-grid" id="stn-grid"></div>
    </div>

    <!-- Advanced settings -->
    <div class="panel" id="tab-adv">
      <div class="adv-grid">

        <section class="card">
          <h2 data-i18n="schedTitle">منشئ الجدول</h2>
          <div class="sched-list" id="sched-rows"></div>
          <div class="add-form">
            <div class="af-field full">
              <label for="new-stn" data-i18n="stationLbl">المحطة</label>
              <select class="inp" id="new-stn"></select>
            </div>
            <div class="af-field">
              <label for="new-day" data-i18n="dayLbl">اليوم</label>
              <select class="inp" id="new-day"></select>
            </div>
            <div class="af-field">
              <label for="new-time" data-i18n="timeLbl">وقت البدء</label>
              <input class="inp" type="time" id="new-time" value="06:00">
            </div>
            <div class="af-field">
              <label for="new-dur" data-i18n="minLbl">المدة (دقيقة)</label>
              <input class="inp" type="number" id="new-dur" min="1" max="120" value="5">
            </div>
            <button class="btn acc" onclick="addRow()" data-i18n="add">إضافة</button>
          </div>
          <div class="plan-row">
            <input class="inp" id="plan-name" data-i18n-ph="planName" placeholder="اسم الجدول…">
            <label class="check"><input type="checkbox" id="use-weather"> <span data-i18n="weather">استخدام التعديل حسب الطقس</span></label>
          </div>
          <div class="btn-row">

/* ================= API (LAN direct / Harith proxy) ================= */
async function apiGet(endpoint,params={}){
  if(demoMode)return demoApi(endpoint,params);
  const pw=pwHash();
  const host=hostVal();
  const isLocal=host.includes('192.168.')||host.includes('localhost')||host.includes('127.0.');
  let url,qs;
  if(isLocal){
    qs=new URLSearchParams({pw,...params}).toString();
    url=`${host}${endpoint}?${qs}`;
  }else{
    qs=new URLSearchParams({_ep:endpoint,_host:host,pw,...params}).toString();
    url=`https://harith.onrender.com/os/proxy?${qs}`;
  }
  const r=await fetch(url,{mode:'cors'});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* ================= Demo simulator =================
   Mimics OpenSprinkler's /jn, /jc, /cm, /cv, /cs responses so every feature
   works offline. Timing is purely arithmetic off the device wall-clock, and
   stations run sequentially (a second run while one is active is queued),
   exactly like a real controller in serial mode. */
const DEMO_NAMES=['المدخل','الحديقة الأمامية','الحديقة الخلفية','النخيل','المسطح الأخضر','الورود','ركن الأشجار','الممر'];
const demo={names:[],dis:0,sched:{},pid:1};
function nowSec(){return Math.floor(Date.now()/1000)}
function demoInit(){demo.names=DEMO_NAMES.slice();demo.dis=0;demo.sched={};demo.pid=1}
function demoPurge(){const n=nowSec();for(const k in demo.sched){if(demo.sched[k].end<=n)delete demo.sched[k]}}
function demoTail(excl){const n=nowSec();let tail=n;for(const k in demo.sched){if(+k===excl)continue;if(demo.sched[k].end>tail)tail=demo.sched[k].end}return tail}
function demoRun(sid,dur){demoPurge();delete demo.sched[sid];const start=demoTail(sid);demo.sched[sid]={start,end:start+dur,dur,pid:demo.pid++}}
function demoStop(sid){
  demoPurge();const n=nowSec();
  if(!demo.sched[sid])return;
  delete demo.sched[sid];
  const items=Object.keys(demo.sched).map(k=>({sid:+k,...demo.sched[+k]})).sort((a,b)=>a.start-b.start);
  let cursor=n;
  for(const it of items){
    if(it.start<=n&&it.end>n){cursor=it.end}
    else{it.start=cursor;it.end=cursor+it.dur;cursor=it.end}
    demo.sched[it.sid]={start:it.start,end:it.end,dur:it.dur,pid:it.pid};
  }
}
function demoApi(endpoint,params){
  return new Promise((res,rej)=>setTimeout(()=>{
    try{res(demoHandle(endpoint,params))}catch(e){rej(e)}
  },130));
}
function demoHandle(ep,p){
  demoPurge();
  const n=nowSec(),N=demo.names.length;
  if(ep==='/jn')return{snames:demo.names.slice(),stn_dis:[demo.dis],nstations:N};
  if(ep==='/jc'){
    const sbits=[];for(let b=0;b<Math.ceil(N/8);b++)sbits[b]=0;
    const ps=[];
    for(let i=0;i<N;i++){
      const s=demo.sched[i];
      if(s&&s.start<=n&&s.end>n){sbits[Math.floor(i/8)]|=(1<<(i%8));ps.push([s.pid,s.end-n,s.start])}
      else if(s&&s.start>n){ps.push([s.pid,s.dur,s.start])}
      else{ps.push([0,0,0])}
    }
    return{sbits,ps,devt:n,nstations:N};
  }
  if(ep==='/cm'){const sid=+p.sid;if(+p.en===1){demoRun(sid,+p.t||300)}else{demoStop(sid)}return{result:1}}
  if(ep==='/cv'){if(+p.rsn===1)demo.sched={};return{result:1}}
  if(ep==='/cs'){
    if('d0' in p)demo.dis=+p.d0||0;
    for(const k in p){const m=/^s(\d+)$/.exec(k);if(m)demo.names[+m[1]]=p[k]}
    return{result:1};
  }
  return{result:1};
}

}

/* ================= Connect ================= */
function buildStations(d){
  stations=(d.snames||[]).map((n,i)=>({index:i,name:n||`S${String(i+1).padStart(2,'0')}`,enabled:true,running:false,queued:false,dur:300,timeLeft:0,runTotal:0,startTime:0}));
  const disVal=(d.stn_dis||[])[0]||0;
  stations.forEach((s,i)=>{s.enabled=!(disVal&(1<<i))});
}
function savePrefs(){
  try{
    localStorage.setItem(LS.host,hostVal());
    localStorage.setItem(LS.pw,$('cfg-pw').value);
    localStorage.setItem(LS.conn,'1');
  }catch(e){}
}
async function connectOS(){
  const btn=$('connect-btn'),spin=$('conn-spin');
  btn.disabled=true;spin.hidden=false;
  setupStatus(t('connecting'));
  try{
    const d=await apiGet('/jn');
    buildStations(d);
    connected=true;
    savePrefs();
    setupStatus('');
    switchTab('stations',$('tab-btn-stations'));
    showView('main');
    updateBadge('on');
    renderStations();populateStationSelect();renderNameEditor();
    showMsg(t('connectedOk'),true);
    refreshRunning();
  }catch(e){
    connected=false;
    setupStatus(t('connectFail'),true);
  }
  btn.disabled=false;spin.hidden=true;
}
async function autoConnect(){
  switchTab('stations',$('tab-btn-stations'));
  showView('main');
  updateBadge('wait');
  try{
    const d=await apiGet('/jn');
    buildStations(d);
    connected=true;
    updateBadge('on');
    renderStations();populateStationSelect();renderNameEditor();
    refreshRunning();
  }catch(e){
    connected=false;
    showView('setup');
    setupStatus(t('connectFail'),true);
  }
}

/* ================= Polling & live countdown ================= */
function startPoll(){
  stopPoll();
  pollTimer=setInterval(()=>{if(connected)refreshRunning()},5000);
  tickTimer=setInterval(tick,1000);
}
function stopPoll(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null}
  if(tickTimer){clearInterval(tickTimer);tickTimer=null}
}
function tick(){
  let changed=false,ended=false;
  stations.forEach(s=>{
    if(s.running&&s.timeLeft>0){
      s.timeLeft--;changed=true;
      if(s.timeLeft<=0)ended=true;
    }
  });
  if(changed)updateTimers();
  if(ended)setTimeout(()=>{if(connected)refreshRunning()},700);
}
function stnSig(){
  return stations.map(s=>`${s.running?1:0}${s.queued?1:0}${s.enabled?1:0}`).join('')+':'+stations.length;
}
async function refreshRunning(){
  try{
    const d=await apiGet('/jc');
    const sbits=d.sbits||[],ps=d.ps||[];
    stations.forEach((s,i)=>{
      const open=(((sbits[Math.floor(i/8)]||0)>>(i%8))&1)===1;
      const p=ps[i]||[0,0,0];
      const pid=p[0]||0,rem=p[1]||0,st=p[2]||0;
      const was=s.running;
      s.running=open;
      s.queued=!open&&pid!==0&&rem>0;
      s.timeLeft=rem;
      s.startTime=st;
      if(s.running&&(!was||rem>(s.runTotal||0)))s.runTotal=Math.max(rem,s.runTotal||0);
      if(!s.running&&!s.queued)s.runTotal=0;
    });
    const sig=stnSig();
    if(sig!==lastSig){renderStations()}
    else updateTimers();
  }catch(e){}
}
function updateTimers(){
  stations.forEach((s,i)=>{
    const r=$('rem-'+i);
    if(r){
      if(s.running)r.textContent=s.timeLeft?fmt(t('remainingSec'),{s:s.timeLeft}):t('running');
      else if(s.queued)r.textContent=fmt(t('queuedSec'),{s:s.timeLeft});
    }
    if(s.queued){const stEl=$('st-'+i);if(stEl){const v=fmtTime(s.startTime);if(v)stEl.textContent=v}}
    const f=$('fill-'+i);
    if(f&&s.running){
      const total=s.runTotal||s.dur||1;
      const w=Math.min(100,Math.max(4,100*(1-(s.timeLeft||0)/total)));
      f.style.width=w+'%';
    }
  });
  $('s-active').textContent=stations.filter(s=>s.running).length;
}

async function refreshStations(){
  try{
    const d=await apiGet('/jn');
    const disVal=(d.stn_dis||[])[0]||0;
    (d.snames||[]).forEach((n,i)=>{
      if(!stations[i])stations[i]={index:i,dur:300,running:false,queued:false,timeLeft:0,runTotal:0,startTime:0};
      stations[i].name=n||`S${String(i+1).padStart(2,'0')}`;
      stations[i].enabled=!(disVal&(1<<i));
    });
    stations.length=(d.snames||[]).length;
    populateStationSelect();renderNameEditor();
    await refreshRunning();
  }catch(e){showMsg(t('cmdFail'),false)}
}

/* ================= Stations render & actions ================= */
function renderStations(){
  const g=$('stn-grid');
  lastSig=stnSig();
  if(!stations.length){g.innerHTML=`<p class="empty">${t('noStations')}</p>`;updateStats();return}
  g.innerHTML=stations.map((s,i)=>{
    const stateCls=s.running?'on':s.queued?'q':s.enabled?'off':'dis';
    const stateTxt=s.running?t('running'):s.queued?t('queued'):s.enabled?t('idle'):t('disabledSt');
    const total=s.runTotal||s.dur||1;
    const w=s.running?Math.min(100,Math.max(4,100*(1-(s.timeLeft||0)/total))):0;
    const remain=s.running?(s.timeLeft?fmt(t('remainingSec'),{s:s.timeLeft}):t('running')):'';
    let liveRow='';
    if(s.running){
      liveRow=`<div class="run-info"><span id="rem-${i}">${remain}</span></div><div class="run-bar"><div class="run-fill" id="fill-${i}" style="width:${w}%"></div></div>`;
    }else if(s.queued){
      const stStr=fmtTime(s.startTime);
      const startLine=stStr?`<div class="start-time"><span class="lbl">${t('startsAt')}</span> <span class="ltr" id="st-${i}">${stStr}</span></div>`:'';
      liveRow=`<div class="run-info q"><span id="rem-${i}">${fmt(t('queuedSec'),{s:s.timeLeft})}</span></div>${startLine}`;
    }
    return `
    <div class="stn-card ${s.running?'running':''} ${s.enabled?'':'off'}">
      <div class="stn-head">
        <span class="stn-name">${esc(s.name)}</span>
        <span class="badge ${stateCls}">${stateTxt}</span>
      </div>
      ${liveRow}
      <div class="dur-row">
        <label>${t('durSec')}</label>
        <input class="dur-input" type="number" min="1" max="3600" value="${s.dur}" onchange="setDur(${i},this.value)">
      </div>
      <div class="stn-actions">
        <button class="btn acc" onclick="runStation(${i})" ${!s.enabled?'disabled':''}>${IC.play} ${t('run')}</button>
        <button class="btn dan" onclick="stopStation(${i})">${IC.stop} ${t('stop')}</button>
        <button class="btn icon-only" onclick="toggleDisable(${i})" title="${s.enabled?t('disableSt'):t('enableSt')}" aria-label="${s.enabled?t('disableSt'):t('enableSt')}">${IC.power}</button>
      </div>
    </div>`;
  }).join('');
  updateStats();
}
function updateStats(){
  $('s-total').textContent=stations.length;
  $('s-active').textContent=stations.filter(s=>s.running).length;
  $('s-disabled').textContent=stations.filter(s=>!s.enabled).length;
}
function setDur(i,v){stations[i].dur=parseInt(v)||300}

async function runStation(i){
  const s=stations[i];
  try{
    await apiGet('/cm',{sid:i,en:1,t:s.dur,ssta:1});
    s.running=true;s.queued=false;s.runTotal=s.dur;s.timeLeft=s.dur;
    renderStations();
    showMsg(fmt(t('startedMsg'),{n:s.name,d:s.dur}),true);
    refreshRunning();
    setTimeout(refreshRunning,1200);
  }catch(e){showMsg(t('runFail'),false)}
}
async function stopStation(i){
  const s=stations[i];
  try{
    await apiGet('/cm',{sid:i,en:0});
    s.running=false;s.queued=false;s.runTotal=0;s.timeLeft=0;
    renderStations();
    showMsg(fmt(t('stoppedMsg'),{n:s.name}),true);
  }catch(e){showMsg(t('stopFail'),false)}
}
async function stopAll(){
  try{
    await apiGet('/cv',{rsn:1});
    stations.forEach(s=>{s.running=false;s.queued=false;s.runTotal=0;s.timeLeft=0});
    renderStations();
    showMsg(t('allStopped'),true);
  }catch(e){showMsg(t('stopAllFail'),false)}
}
async function toggleDisable(i){
  const s=stations[i];
  s.enabled=!s.enabled;
  let disVal=0;
  stations.forEach((st,j)=>{if(!st.enabled)disVal|=(1<<j)});
  try{
    await apiGet('/cs',{d0:disVal});
    renderStations();populateStationSelect();
    showMsg(fmt(s.enabled?t('enabledMsg'):t('disabledMsg'),{n:s.name}),true);
  }catch(e){s.enabled=!s.enabled;showMsg(t('cmdFail'),false)}
}

/* ================= Schedule builder ================= */
function renderDayOptions(){
  const sel=$('new-day');
  const cur=sel.value;
  sel.innerHTML=DAYS_EN.map(d=>`<option value="${d}">${T[lang].days[d]}</option>`).join('');
  if(DAYS_EN.includes(cur))sel.value=cur;
}
function populateStationSelect(){
  const sel=$('new-stn');
  const cur=sel.value;
  sel.innerHTML=stations.filter(s=>s.enabled).map(s=>`<option value="${esc(s.name)}">${esc(s.name)}</option>`).join('');
  if([...sel.options].some(o=>o.value===cur))sel.value=cur;
}
function renderSchedRows(){
  const c=$('sched-rows');
  if(!schedRows.length){c.innerHTML=`<p class="empty">${t('noRows')}</p>`;return}
  c.innerHTML=schedRows.map((r,i)=>`
    <div class="sched-item">
      <div class="sched-info">
        <div class="sched-stn">${esc(r.station)}</div>
        <div class="sched-meta">
          <span>${T[lang].days[r.day]||r.day}</span>
          <span class="ltr">${r.start_time}</span>
          <span>${r.duration_minutes} ${t('minutes')}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteRow(${i})" title="${t('del')}" aria-label="${t('del')}">${IC.x}</button>
    </div>`).join('');
}
function addRow(){
  const stn=$('new-stn').value;
  const day=$('new-day').value;
  const time=$('new-time').value;
  const dur=parseInt($('new-dur').value)||5;
  if(!stn){showMsg(t('selectStation'),false);return}
  schedRows.push({station:stn,day:day,start_time:time,duration_minutes:dur});
  renderSchedRows();
  $('json-section').hidden=true;
}
function deleteRow(i){schedRows.splice(i,1);renderSchedRows();$('json-section').hidden=true}
function clearRows(){schedRows=[];renderSchedRows();$('json-section').hidden=true}
function generateJSON(){
  if(!schedRows.length){showMsg(t('addRowsFirst'),false);return}
  const name=$('plan-name').value||t('planDefault');
  const plan={schedule_name:name,use_weather:$('use-weather').checked,rows:schedRows};
  $('json-out').textContent=JSON.stringify(plan,null,2);
  $('json-section').hidden=false;
}
function copyText(txt){
  if(navigator.clipboard&&window.isSecureContext)return navigator.clipboard.writeText(txt);
  return new Promise((res,rej)=>{
    const ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');res()}catch(e){rej(e)}
    document.body.removeChild(ta);
  });
}
function copyJSON(){
  copyText($('json-out').textContent)
    .then(()=>showMsg(t('copied'),true))
    .catch(()=>showMsg(t('copyFail'),false));
}

/* ================= Station names editor ================= */
function renderNameEditor(){
  const c=$('name-editor');
  if(!stations.length){c.innerHTML=`<p class="empty">${t('connectFirstNames')}</p>`;return}
  c.innerHTML=stations.map((s,i)=>`
    <div class="name-row">
      <span class="name-lbl ltr">S${String(i+1).padStart(2,'0')}</span>
      <input class="inp" id="n-${i}" value="${esc(s.name)}">
    </div>`).join('');
}
async function saveNames(){
  const params={};
  stations.forEach((s,i)=>{
    const el=$('n-'+i);
    const v=(el?el.value:s.name)||s.name;
    params['s'+i]=v;s.name=v;
  });
  try{
    await apiGet('/cs',params);
    populateStationSelect();renderStations();
    showMsg(t('namesSaved'),true);
  }catch(e){showMsg(t('saveFail'),false)}
}

/* ================= Init ================= */
(function init(){
  let savedLang=null,savedTheme=null,auto=false;
  try{
    savedLang=localStorage.getItem(LS.lang);
    savedTheme=localStorage.getItem(LS.theme);
    const h=localStorage.getItem(LS.host);
    const p=localStorage.getItem(LS.pw);
    if(h)$('cfg-host').value=h;
    if(p)$('cfg-pw').value=p;
    auto=localStorage.getItem(LS.conn)==='1'&&!!h;
  }catch(e){}
  setTheme(savedTheme==='light'?'light':'dark');
  setLang(savedLang==='en'?'en':'ar');
  if(auto)autoConnect();
})();
</script>
